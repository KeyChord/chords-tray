[config]
name = "macOS Tray"

[config.js]
module = '''
import buildTrayHandler from 'dist/tray.js';
export default buildTrayHandler();
'''

[chords]
'?=' = { name = "Tray" }
# '=0' = { name = "Tray: Notch", 'args:notch' = [] }
'=1' = { name = "Tray: 1st Item", args = [0] }
'=2' = { name = "Tray: 2nd Item", args = [1] }
'=3' = { name = "Tray: 3rd Item", args = [2] }
'=4' = { name = "Tray: 4th Item", args = [3] }
'=5' = { name = "Tray: 5th Item", args = [4] }
'=6' = { name = "Tray: 6th Item", args = [5] }
'=7' = { name = "Tray: 7th Item", args = [6] }
'=8' = { name = "Tray: 8th Item", args = [7] }
'=9' = { name = "Tray: 9th Item", args = [8] }

'?=-' = { name = "Tray: From End" }
'=-1' = { name = "Tray: 1st End Item", args = [-1] }
'=-2' = { name = "Tray: 2nd End Item", args = [-2] }
'=-3' = { name = "Tray: 3rd End Item", args = [-3] }
'=-4' = { name = "Tray: 4th End Item", args = [-4] }
'=-5' = { name = "Tray: 5th End Item", args = [-5] }
'=-6' = { name = "Tray: 6th End Item", args = [-6] }
'=-7' = { name = "Tray: 7th End Item", args = [-7] }
'=-8' = { name = "Tray: 8th End Item", args = [-8] }
'=-9' = { name = "Tray: 9th End Item", args = [-9] }
'=1/' = { name = "Tray: 1st Item Right Click", args = [0, 'right'] }
'=2/' = { name = "Tray: 2nd Item Right Click", args = [1, 'right'] }
'=3/' = { name = "Tray: 3rd Item Right Click", args = [2, 'right'] }
'=4/' = { name = "Tray: 4th Item Right Click", args = [3, 'right'] }
'=5/' = { name = "Tray: 5th Item Right Click", args = [4, 'right'] }
'=6/' = { name = "Tray: 6th Item Right Click", args = [5, 'right'] }
'=7/' = { name = "Tray: 7th Item Right Click", args = [6, 'right'] }
'=8/' = { name = "Tray: 8th Item Right Click", args = [7, 'right'] }
'=9/' = { name = "Tray: 9th Item Right Click", args = [8, 'right'] }
'=-1/' = { name = "Tray: 1st End Item Right Click", args = [-1, 'right'] }
'=-2/' = { name = "Tray: 2nd End Item Right Click", args = [-2, 'right'] }
'=-3/' = { name = "Tray: 3rd End Item Right Click", args = [-3, 'right'] }
'=-4/' = { name = "Tray: 4th End Item Right Click", args = [-4, 'right'] }
'=-5/' = { name = "Tray: 5th End Item Right Click", args = [-5, 'right'] }
'=-6/' = { name = "Tray: 6th End Item Right Click", args = [-6, 'right'] }
'=-7/' = { name = "Tray: 7th End Item Right Click", args = [-7, 'right'] }
'=-8/' = { name = "Tray: 8th End Item Right Click", args = [-8, 'right'] }
'=-9/' = { name = "Tray: 9th End Item Right Click", args = [-9, 'right'] }

'=b' = { name = "Tray: Battery" }
'=c' = { name = "Tray: Control Center" }
'=t' = { name = "Tray: Time & Date" }

'?=w' = { name = "Tray Wi-Fi" }
'=w' = { name = "Tray: Wi-Fi" }
'=wv' = { name = "Tray Wi-Fi: Vary On/Off" }
